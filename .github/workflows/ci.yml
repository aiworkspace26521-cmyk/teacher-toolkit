name: CI
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
jobs:
  encoding-check:
    name: Encoding Check (UTF-8 / Mojibake)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Run encoding check
        run: node tools/scripts/encoding-check.js

  game-manual-consistency:
    name: Game Manual Consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Check GAME-MANUAL consistency
        run: node tools/learning-kpi-dashboard/test/game-manual-consistency.js

  simulation-test:
    name: Simulation Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Run simulation test
        run: node tools/learning-kpi-dashboard/test/simulation-test.js

  evo-stage-audit:
    name: EVO_STAGE_MAP Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Run EVO_STAGE_MAP level audit (801 species)
        run: node tools/learning-kpi-dashboard/test/evo-stage-level-audit.js
      - name: Run EVO_STAGE_MAP chain audit
        run: node tools/learning-kpi-dashboard/test/evo-stage-audit.js

  e2e-smoke:
    name: E2E Smoke Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Install dependencies
        run: npm ci || npm install
      - name: Install Playwright browsers
        run: npx playwright install chromium
      - name: Run E2E tests
        run: npx playwright test
        env:
          BASE_URL: 'https://opencodefirebase.web.app'

  firestore-lint:
    name: Firestore Rules & Indexes Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate firestore.rules syntax
        run: |
          FILE="tools/learning-kpi-dashboard/firestore/firestore.rules"
          if [ ! -f "$FILE" ]; then echo "❌ $FILE not found"; exit 1; fi
          if ! grep -q "service cloud.firestore" "$FILE"; then echo "❌ firestore.rules missing service header"; exit 1; fi
          if ! grep -q "match /databases/{database}/documents" "$FILE"; then echo "❌ firestore.rules missing database match"; exit 1; fi
          echo "✅ firestore.rules structure OK"
      - name: Validate firestore.indexes.json syntax
        run: |
          FILE="tools/learning-kpi-dashboard/firestore/firestore.indexes.json"
          if [ ! -f "$FILE" ]; then echo "❌ $FILE not found"; exit 1; fi
          node -e "const j=require('./$FILE'); if(!j.indexes||!Array.isArray(j.indexes)){process.exit(1)}; console.log('✅ firestore.indexes.json valid, '+j.indexes.length+' indexes');"
